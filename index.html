<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WebGIS Geumjeong-gu | Pendidikan & Transportasi</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  font-family:'DM Sans','Noto Sans KR',sans-serif;
  overflow:hidden;
}

#map{
  width:100%;
  height:100%;
}

/* HEADER */
#header{
  position:absolute;
  top:14px;
  left:50%;
  transform:translateX(-50%);
  z-index:999;
  background:white;
  padding:12px 22px;
  border-radius:999px;
  box-shadow:0 4px 18px rgba(0,0,0,.15);
  display:flex;
  align-items:center;
  gap:10px;
}

.header-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#1A6BB5;
}

.header-title{
  font-weight:700;
  color:#0C447C;
  font-size:14px;
}

.header-sub{
  color:#64748B;
  font-size:12px;
}

/* PANEL */
.panel{
  position:absolute;
  z-index:999;
  background:white;
  border-radius:14px;
  box-shadow:0 4px 20px rgba(0,0,0,.12);
  overflow:hidden;
}

.panel-head{
  padding:12px 16px;
  border-bottom:1px solid #EEF2F7;
  font-size:12px;
  font-weight:700;
  color:#64748B;
  letter-spacing:.05em;
  text-transform:uppercase;
}

.panel-body{
  padding:14px 16px;
}

/* STATS */
#stats{
  top:80px;
  left:14px;
  width:220px;
}

.stat{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 0;
  border-bottom:1px solid #F1F5F9;
}

.stat:last-child{
  border:none;
}

.stat-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.stat-dot{
  width:11px;
  height:11px;
  border-radius:50%;
}

.stat-name{
  font-size:13px;
  color:#475569;
}

.stat-val{
  font-weight:700;
  color:#0F172A;
}

/* LEGEND */
#legend{
  bottom:20px;
  left:14px;
  width:220px;
}

.legend-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.legend-sym{
  width:14px;
  height:14px;
  border-radius:50%;
}

.legend-label{
  font-size:13px;
  color:#334155;
}

/* SEARCH */
#searchBox{
  position:absolute;
  top:80px;
  right:14px;
  z-index:999;
  width:260px;
  background:white;
  border-radius:14px;
  box-shadow:0 4px 20px rgba(0,0,0,.12);
  overflow:hidden;
}

#searchInput{
  width:100%;
  border:none;
  outline:none;
  padding:14px;
  font-size:13px;
}

#searchResults{
  max-height:220px;
  overflow-y:auto;
  display:none;
}

.search-item{
  padding:12px 14px;
  cursor:pointer;
  border-top:1px solid #F1F5F9;
}

.search-item:hover{
  background:#EFF6FF;
}

/* BUTTON */
#zoomBtn{
  position:absolute;
  bottom:20px;
  right:14px;
  z-index:999;
  border:none;
  background:#1A6BB5;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  box-shadow:0 4px 18px rgba(0,0,0,.15);
}

/* POPUP */
.leaflet-popup-content-wrapper{
  border-radius:16px;
  overflow:hidden;
}

.popup-head{
  padding:14px 16px;
  color:white;
}

.popup-title{
  font-size:15px;
  font-weight:700;
}

.popup-body{
  padding:14px 16px;
}

.popup-row{
  margin-bottom:8px;
  font-size:13px;
  line-height:1.5;
}

.popup-tag{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- HEADER -->
<div id="header">
  <div class="header-dot"></div>
  <div class="header-title">WebGIS Geumjeong-gu</div>
  <div class="header-sub">Pendidikan & Transportasi</div>
</div>

<!-- STATS -->
<div class="panel" id="stats">
  <div class="panel-head">Ringkasan Data</div>

  <div class="panel-body">

    <div class="stat">
      <div class="stat-left">
        <div class="stat-dot" style="background:#2E8B57"></div>
        <div class="stat-name">SD</div>
      </div>
      <div class="stat-val" id="sdCount">0</div>
    </div>

    <div class="stat">
      <div class="stat-left">
        <div class="stat-dot" style="background:#1A6BB5"></div>
        <div class="stat-name">SMP</div>
      </div>
      <div class="stat-val" id="smpCount">0</div>
    </div>

    <div class="stat">
      <div class="stat-left">
        <div class="stat-dot" style="background:#C0392B"></div>
        <div class="stat-name">SMA/SMK</div>
      </div>
      <div class="stat-val" id="smaCount">0</div>
    </div>

    <div class="stat">
      <div class="stat-left">
        <div class="stat-dot" style="background:#D4720A"></div>
        <div class="stat-name">Bus Stop</div>
      </div>
      <div class="stat-val" id="busCount">0</div>
    </div>

    <div class="stat">
      <div class="stat-left">
        <div class="stat-dot" style="background:#0C447C"></div>
        <div class="stat-name">Train Station</div>
      </div>
      <div class="stat-val" id="trainCount">0</div>
    </div>

  </div>
</div>

<!-- LEGEND -->
<div class="panel" id="legend">
  <div class="panel-head">Legenda</div>

  <div class="panel-body">

    <div class="legend-row">
      <div class="legend-sym" style="background:#2E8B57"></div>
      <div class="legend-label">SD</div>
    </div>

    <div class="legend-row">
      <div class="legend-sym" style="background:#1A6BB5"></div>
      <div class="legend-label">SMP</div>
    </div>

    <div class="legend-row">
      <div class="legend-sym" style="background:#C0392B"></div>
      <div class="legend-label">SMA/SMK</div>
    </div>

    <div class="legend-row">
      <div class="legend-sym" style="background:#D4720A"></div>
      <div class="legend-label">Bus Stop</div>
    </div>

    <div class="legend-row">
      <div class="legend-sym" style="background:#0C447C"></div>
      <div class="legend-label">Train Station</div>
    </div>

  </div>
</div>

<!-- SEARCH -->
<div id="searchBox">
  <input type="text" id="searchInput" placeholder="Cari sekolah atau stasiun..."/>
  <div id="searchResults"></div>
</div>

<!-- BUTTON -->
<button id="zoomBtn">Zoom Geumjeong</button>

<script>

// =======================
// MAP
// =======================

const GEUMJEONG_BOUNDS = L.latLngBounds(
  [35.195,129.005],
  [35.310,129.120]
);

const map = L.map('map',{
  center:[35.237,129.085],
  zoom:13,
  minZoom:12,
  maxZoom:18,
  maxBounds:GEUMJEONG_BOUNDS,
  maxBoundsViscosity:1.0
});

map.fitBounds(GEUMJEONG_BOUNDS);

// =======================
// BASEMAP
// =======================

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {
    attribution:'© OpenStreetMap © CartoDB'
  }
).addTo(map);

// =======================
// ICONS
// =======================

function makeIcon(color){

  return L.divIcon({
    className:'',
    html:`
      <div style="
        width:20px;
        height:20px;
        border-radius:50%;
        background:${color};
        border:3px solid white;
        box-shadow:0 2px 10px rgba(0,0,0,.25);
      "></div>
    `,
    iconSize:[20,20]
  });

}

const iconSD = makeIcon('#2E8B57');
const iconSMP = makeIcon('#1A6BB5');
const iconSMA = makeIcon('#C0392B');
const iconBus = makeIcon('#D4720A');
const iconTrain = makeIcon('#0C447C');

// =======================
// SAMPLE DATA
// =======================

const trainStations = [
  {
    name:'Jangjeon Station',
    coord:[35.2290,129.0870]
  },
  {
    name:'Busan Univ Station',
    coord:[35.2330,129.0860]
  }
];

const busStops = [
  {
    name:'Geumjeong Office',
    coord:[35.2250,129.0820]
  },
  {
    name:'Bus Stop Central',
    coord:[35.2370,129.0840]
  }
];

const schools = [
  {
    name:'Geumsa Elementary School',
    level:'SD',
    coord:[35.2280,129.0830]
  },
  {
    name:'Geumjeong Middle School',
    level:'SMP',
    coord:[35.2350,129.0850]
  },
  {
    name:'Busan Science High School',
    level:'SMA',
    coord:[35.2400,129.0900]
  }
];

// =======================
// BOUNDARY
// =======================

const boundaryCoords = [
  [35.3002,129.0412],
  [35.2056,129.0467],
  [35.2067,129.1056],
  [35.3002,129.0412]
];

const boundary = L.polygon(boundaryCoords,{
  color:'#2E8B57',
  weight:3,
  fillColor:'#2E8B57',
  fillOpacity:.08
}).addTo(map);

boundary.on('mouseover',()=>{
  boundary.setStyle({
    fillOpacity:.18,
    weight:5
  });
});

boundary.on('mouseout',()=>{
  boundary.setStyle({
    fillOpacity:.08,
    weight:3
  });
});

// =======================
// RAILWAY
// =======================

L.polyline([
  [35.2290,129.0870],
  [35.2330,129.0860],
  [35.2400,129.0880]
],{
  color:'#1A6BB5',
  weight:4
}).addTo(map);

// =======================
// DISTANCE
// =======================

function nearestDistance(coord,arr){

  let minDist = Infinity;
  let nearestName = '';

  arr.forEach(item=>{

    const dist = map.distance(
      coord,
      item.coord
    ) / 1000;

    if(dist < minDist){
      minDist = dist;
      nearestName = item.name;
    }

  });

  return {
    name:nearestName,
    distance:minDist.toFixed(2)
  };

}

// =======================
// SEARCH
// =======================

const SEARCH_DATA = [];

// =======================
// TRAIN
// =======================

trainStations.forEach(item=>{

  SEARCH_DATA.push({
    name:item.name,
    coord:item.coord
  });

  L.marker(item.coord,{
    icon:iconTrain
  })
  .addTo(map)
  .bindPopup(`
    <div>
      <div class="popup-head" style="background:#0C447C">
        <div class="popup-title">${item.name}</div>
      </div>

      <div class="popup-body">
        <div class="popup-row">
          🚆 Train Station
        </div>
      </div>
    </div>
  `);

});

document.getElementById('trainCount').innerText =
  trainStations.length;

// =======================
// BUS
// =======================

busStops.forEach(item=>{

  SEARCH_DATA.push({
    name:item.name,
    coord:item.coord
  });

  L.marker(item.coord,{
    icon:iconBus
  })
  .addTo(map)
  .bindPopup(`
    <div>
      <div class="popup-head" style="background:#D4720A">
        <div class="popup-title">${item.name}</div>
      </div>

      <div class="popup-body">
        <div class="popup-row">
          🚌 Bus Stop
        </div>
      </div>
    </div>
  `);

});

document.getElementById('busCount').innerText =
  busStops.length;

// =======================
// SCHOOLS
// =======================

let sd=0,smp=0,sma=0;

schools.forEach(item=>{

  SEARCH_DATA.push({
    name:item.name,
    coord:item.coord
  });

  const nearTrain =
    nearestDistance(item.coord,trainStations);

  const nearBus =
    nearestDistance(item.coord,busStops);

  let icon;
  let color;

  if(item.level==='SD'){
    icon=iconSD;
    color='#2E8B57';
    sd++;
  }

  else if(item.level==='SMP'){
    icon=iconSMP;
    color='#1A6BB5';
    smp++;
  }

  else{
    icon=iconSMA;
    color='#C0392B';
    sma++;
  }

  const marker = L.marker(item.coord,{
    icon:icon
  }).addTo(map);

  marker.bindPopup(`
    <div>

      <div class="popup-head"
        style="background:${color}">
        <div class="popup-title">
          ${item.name}
        </div>
      </div>

      <div class="popup-body">

        <div class="popup-row">
          🎓 Tingkat:
          <b>${item.level}</b>
        </div>

        <div class="popup-row">
          🚆 Train Terdekat:
          <b>${nearTrain.name}</b>
        </div>

        <div class="popup-row">
          📏 Jarak:
          <span class="popup-tag"
            style="
              background:#DBEAFE;
              color:#1E40AF;
            ">
            ${nearTrain.distance} km
          </span>
        </div>

        <div class="popup-row">
          🚌 Bus Stop Terdekat:
          <b>${nearBus.name}</b>
        </div>

        <div class="popup-row">
          📏 Jarak:
          <span class="popup-tag"
            style="
              background:#FED7AA;
              color:#9A3412;
            ">
            ${nearBus.distance} km
          </span>
        </div>

      </div>

    </div>
  `);

  marker.on('mouseover',()=>{
    marker.openPopup();
  });

});

document.getElementById('sdCount').innerText = sd;
document.getElementById('smpCount').innerText = smp;
document.getElementById('smaCount').innerText = sma;

// =======================
// SEARCH
// =======================

const searchInput =
  document.getElementById('searchInput');

const searchResults =
  document.getElementById('searchResults');

searchInput.addEventListener('input',()=>{

  const q =
    searchInput.value.toLowerCase();

  searchResults.innerHTML='';

  if(!q){
    searchResults.style.display='none';
    return;
  }

  const results = SEARCH_DATA.filter(item=>
    item.name.toLowerCase().includes(q)
  );

  results.forEach(item=>{

    const div =
      document.createElement('div');

    div.className='search-item';

    div.innerHTML=item.name;

    div.onclick=()=>{

      map.setView(item.coord,16);

      searchResults.style.display='none';

    };

    searchResults.appendChild(div);

  });

  searchResults.style.display='block';

});

// =======================
// BUTTON
// =======================

document.getElementById('zoomBtn')
.addEventListener('click',()=>{

  map.fitBounds(GEUMJEONG_BOUNDS);

});

</script>

</body>
</html>
