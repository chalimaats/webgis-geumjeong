    {

      maxZoom:19

};

let curBM=BM.light;

function switchBM(k,btn){

  map.removeLayer(curBM);

  curBM=BM[k];

    .querySelectorAll('.bm-btn')
    .forEach(b=>b.classList.remove('on'));

  btn.classList.add('on');

}

function pinIcon(color,shape='round'){

  const borderRadius = shape==='sq'
    ? '4px 4px 4px 0'
    : '50% 50% 50% 0';

  const html=`

    <div style="
      display:flex;
      flex-direction:column;
      align-items:center;
    ">

      <div style="
        width:24px;
        height:24px;
        border-radius:${borderRadius};
        transform:rotate(-45deg);
        background:${color};
        border:2.5px solid rgba(255,255,255,.95);
        box-shadow:0 3px 10px rgba(0,0,0,.3);
        display:flex;
        align-items:center;
        justify-content:center;
      ">

        <div style="
          width:7px;
          height:7px;
          border-radius:50%;
          background:white;
          transform:rotate(45deg);
        "></div>

      </div>

    </div>
  `;

  return L.divIcon({
    html,
    className:'',
    iconSize:[24,24],
    iconAnchor:[12,24],
    popupAnchor:[0,-24]
  });

}

function schoolIcon(lv){

  if(lv==1) return pinIcon('#2E8B57');

  if(lv==2) return pinIcon('#1A6BB5');

  if(lv==3) return pinIcon('#C0392B','sq');

  return pinIcon('#64748B');

}

// =======================
// TOGGLE LAYER
// =======================

function toggleLayer(k){

  const t=document.getElementById('tog-'+k);

  if(VIS[k]){

    map.removeLayer(LY[k]);

    t.classList.remove('on');

  }else{

    map.addLayer(LY[k]);

    t.classList.add('on');

  }

  VIS[k]=!VIS[k];

}

// =======================
// DISTANCE FUNCTION
// =======================

function nearestDistance(latlng, features){

  let minDist = Infinity;

  let nearestName = '-';

  features.features.forEach(f=>{

    const [lng,lat] =
      f.geometry.coordinates;

    const dist = map.distance(
      latlng,
      L.latLng(lat,lng)
    ) / 1000;

    if(dist < minDist){

      minDist = dist;

      nearestName =
        f.properties.name || '-';

    }

  });

  return {
    distance:minDist.toFixed(2),
    name:nearestName
  };

}

function renderBuffer(trainGJ){

  const grp=L.layerGroup();

  trainGJ.features.forEach(f=>{

    const [lng,lat] =
      f.geometry.coordinates;

    L.circle(
      [lat,lng],
      {
        radius:500,
        color:'#1A6BB5',
        weight:1.5,
        fillColor:'#1A6BB5',
        fillOpacity:.08,
        dashArray:'5,4'
      }
    ).addTo(grp);

  });

  LY.buf=grp;

  grp.addTo(map);

}

// =======================
// EDUCATION
// =======================

function renderEducation(
  gj,
  trainData,
  busData
){

  let sd=0;
  let smp=0;
  let sma=0;

  const lyr=L.geoJSON(gj,{

    pointToLayer:(f,ll)=>{

      const lv=f.properties.isced_leve;

      if(lv==1) sd++;
      else if(lv==2) smp++;
      else if(lv==3) sma++;

      SEARCH.push({
        name:f.properties.name || 'School',
        ll,
        cat:'Education'
      });

      return L.marker(
        ll,
        {
          icon:schoolIcon(lv)
        }
      );

    },

    onEachFeature:(f,l)=>{

      const latlng =
        l.getLatLng();

      const nearTrain =
        nearestDistance(
          latlng,
          trainData
        );

      const nearBus =
        nearestDistance(
          latlng,
          busData
        );

      const popup=`

        <div>

          <div class="pu-head"
            style="
              background:#E8F5EE;
              border-color:#2E8B57;
            ">

            <div class="pu-badge"
              style="
                background:#2E8B5720;
                color:#2E8B57;
              ">
              🎓 Education
            </div>

            <div class="pu-name">
              ${f.properties.name || 'School'}
            </div>

          </div>

          <div class="pu-body">

            <div class="pu-row">

              <span class="pu-key">
                Level
              </span>

              <span class="pu-val">

                ${
                  f.properties.isced_leve==1
                  ? 'SD'

                  : f.properties.isced_leve==2
                  ? 'SMP'

                  : f.properties.isced_leve==3
                  ? 'SMA/SMK'

                  : 'School'
                }

              </span>

            </div>

            <div class="pu-row">

              <span class="pu-key">
                Train Station
              </span>

              <span class="pu-val">
                ${nearTrain.name}
              </span>

            </div>

            <div class="pu-row">

              <span class="pu-key">
                Distance
              </span>

              <span class="pu-tag"
                style="
                  background:#EBF4FF;
                  color:#1A6BB5;
                ">

                ${nearTrain.distance} km

              </span>

            </div>

            <div class="pu-row">

              <span class="pu-key">
                Bus Stop
              </span>

              <span class="pu-val">
                ${nearBus.name}
              </span>

            </div>

            <div class="pu-row">

              <span class="pu-key">
                Distance
              </span>

              <span class="pu-tag"
                style="
                  background:#FEF3E2;
                  color:#D4720A;
                ">

                ${nearBus.distance} km

              </span>

            </div>

          </div>

        </div>
      `;

      l.bindPopup(
        popup,
        {
          maxWidth:300
        }
      );

    }

  });

  LY.edu=lyr;

  lyr.addTo(map);

  document.getElementById('cnt-sd')
    .textContent=sd;

  document.getElementById('cnt-smp')
    .textContent=smp;

  document.getElementById('cnt-sma')
    .textContent=sma;

}

// =======================
// SEARCH
// =======================

const sinp =
  document.getElementById('search-inp');

const sres =
  document.getElementById('search-res');

sinp.addEventListener('input',()=>{

  const q=
    sinp.value.trim().toLowerCase();

  sres.innerHTML='';

  if(!q){

    sres.style.display='none';

    return;

  }

  const hits=SEARCH
    .filter(d=>
      d.name
      .toLowerCase()
      .includes(q)
    )
    .slice(0,8);

  if(!hits.length){

    sres.style.display='none';

    return;

  }

  hits.forEach(d=>{

    const el=document.createElement('div');

    el.className='s-item';

    el.innerHTML=`
      <div class="s-item-name">
        ${d.name}
      </div>

      <div class="s-item-cat">
        ${d.cat}
      </div>
    `;

    el.onclick=()=>{

      map.setView(d.ll,16);

      sres.style.display='none';

      sinp.value=d.name;

    };

    sres.appendChild(el);

  });

  sres.style.display='block';

});

// =======================
// FETCH
// =======================

async function tryFetch(
  url,
  fallback
){

  try{

    const r=await fetch(url);

    if(!r.ok)
      throw new Error();

    return await r.json();

  }catch{

    return fallback;

  }

}

// =======================
// SAMPLE DATA
// =======================

const DATA={

  education:{
    type:'FeatureCollection',
    features:[]
  },

  train:{
    type:'FeatureCollection',
    features:[]
  },

  bus:{
    type:'FeatureCollection',
    features:[]
  },

  railway:{
    type:'FeatureCollection',
    features:[]
  }

};

// =======================
// INIT
// =======================

async function init(){

  const [
    edu,
    train,
    bus,
    rail

  ] = await Promise.all([

    tryFetch(
      './data/education_geumjeong.geojson',
      DATA.education
    ),

    tryFetch(
      './data/train_station_geumjeong.geojson',
      DATA.train
    ),

    tryFetch(
      './data/bus_station_geumjeong.geojson',
      DATA.bus
    ),

    tryFetch(
      './data/railway_geumjeong.geojson',
      DATA.railway
    )

  ]);

  renderBoundary();

  renderBuffer(train);

  renderRailway(rail);

  renderBus(bus);

  renderTrain(train);

  renderEducation(
    edu,
    train,
    bus
  );

}

init();
